</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-icon">FDS</div>
        <h1 class="logo-text">Fofana Design Shop</h1>
    </div>

    <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="produits.html">Produits</a>
        <a href="services.html">Services</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>
</header>

<section class="contact-section">
    <h2 class="title">📞 Contactez-nous</h2>

    <div class="contact-container">

        <!-- Informations -->
        <div class="contact-info">
            <p><strong>Téléphone :</strong> <a href="tel:+221772350801">77 235 08 01</a></p>
            <p><strong>Adresse :</strong> Toubab Dialaw, à côté de la grande mosquée</p>
            <div class="map-container">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3870.123456789!2d-17.100000!3d14.333333!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sToubab+Dialaw+Mosquee!5e0!3m2!1sfr!2s!4v0000000000000" 
        width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
</div>
            <div class="socials">
                <a href="#" onclick="whatsapp()"><i class="fab fa-whatsapp"></i></a>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>

        <!-- Formulaire contact -->
        <div class="contact-form">
            <form>
                <input type="text" placeholder="Votre nom" required>
                <input type="email" placeholder="Votre email" required>
                <textarea placeholder="Votre message" rows="5" required></textarea>
                <button type="submit">Envoyer</button>
            </form>
            <button class="whatsapp-btn" onclick="sendWhatsApp()">Envoyer via WhatsApp</button>
        </div>

    </div>
</section>
<script>
function sendWhatsApp() {
    const name = document.querySelector('input[type="text"]').value;
    const email = document.querySelector('input[type="email"]').value;
    const message = document.querySelector('textarea').value;

    if(!name || !email || !message){
        alert("Veuillez remplir tous les champs avant d'envoyer !");
        return;
    }

    const text = `Bonjour, je suis ${name} (${email}). Message: ${message}`;
    const phone = "+221772350801"; // numéro de ton frère
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;
    window.open(url, "_blank");
}
</script>
</body>
